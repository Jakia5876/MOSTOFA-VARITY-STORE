<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" style="stop-color:#efebe9"/>
      <stop offset="100%" style="stop-color:#d7ccc8"/>
    </radialGradient>
    <linearGradient id="syrup" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6d4c41"/>
      <stop offset="100%" style="stop-color:#3e2723"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5d4037bb"/>
      <stop offset="40%" style="stop-color:#8d6e6388"/>
      <stop offset="100%" style="stop-color:#4e342ebb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <ellipse cx="200" cy="345" rx="50" ry="10" fill="#3e272320"/>
  <!-- Bottle -->
  <path d="M160,170 L160,310 Q160,335 185,335 L215,335 Q240,335 240,310 L240,170 Z" fill="url(#bottle)"/>
  <!-- Syrup inside -->
  <rect x="165" y="200" width="70" height="130" fill="url(#syrup)" opacity="0.7" rx="2"/>
  <!-- Neck -->
  <rect x="183" y="115" width="34" height="60" rx="4" fill="#5d4037aa"/>
  <!-- Cap -->
  <rect x="178" y="100" width="44" height="20" rx="8" fill="#4e342e"/>
  <!-- Label -->
  <rect x="165" y="220" width="70" height="75" rx="4" fill="#efebe9ee"/>
  <text x="200" y="245" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#3e2723">MAPLE</text>
  <text x="200" y="265" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#4e342e">SYRUP</text>
  <text x="200" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8d6e63">Organic</text>
  <!-- Leaf -->
  <path d="M195,205 Q200,195 205,205 Q200,210 195,205" fill="#c62828" opacity="0.7"/>
  <!-- Shine -->
  <rect x="163" y="175" width="6" height="155" rx="3" fill="#ffffff15"/>
</svg>
