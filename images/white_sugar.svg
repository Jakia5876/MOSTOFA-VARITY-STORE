<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#faf8f0"/>
      <stop offset="100%" style="stop-color:#e8e0cc"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000030"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Bowl -->
  <ellipse cx="200" cy="280" rx="130" ry="25" fill="#c9b89680"/>
  <path d="M100,200 Q100,300 200,310 Q300,300 300,200 Z" fill="#fff" stroke="#e0d5c0" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="200" cy="200" rx="100" ry="30" fill="#fffef8" stroke="#e0d5c0" stroke-width="1.5"/>
  <!-- Sugar grains -->
  <circle cx="170" cy="195" r="3" fill="#f5f0e6" opacity="0.8"/>
  <circle cx="190" cy="190" r="2.5" fill="#ede5d5" opacity="0.7"/>
  <circle cx="210" cy="193" r="3.5" fill="#f8f3e8" opacity="0.9"/>
  <circle cx="230" cy="197" r="2" fill="#f0e8d8" opacity="0.6"/>
  <circle cx="180" cy="202" r="2" fill="#f5f0e6"/>
  <circle cx="220" cy="200" r="2.5" fill="#ede5d5"/>
  <!-- Label -->
  <text x="200" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8b7355" letter-spacing="3">PREMIUM</text>
  <text x="200" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#a08860" letter-spacing="2">White Sugar</text>
</svg>
