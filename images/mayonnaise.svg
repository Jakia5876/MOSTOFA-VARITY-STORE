<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" style="stop-color:#fffde7"/>
      <stop offset="100%" style="stop-color:#fff9c4"/>
    </radialGradient>
    <linearGradient id="jar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="20%" style="stop-color:#f5f5f5"/>
      <stop offset="80%" style="stop-color:#eeeeee"/>
      <stop offset="100%" style="stop-color:#bdbdbd"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <ellipse cx="200" cy="340" rx="70" ry="12" fill="#00000015"/>
  <!-- Jar -->
  <path d="M140,160 L140,300 Q140,330 170,330 L230,330 Q260,330 260,300 L260,160 Z" fill="url(#jar)" opacity="0.95"/>
  <!-- Mayo inside -->
  <rect x="145" y="170" width="110" height="155" fill="#fffde7" opacity="0.8"/>
  <!-- Lid -->
  <rect x="150" y="140" width="100" height="25" rx="8" fill="#1565c0"/>
  <rect x="175" y="130" width="50" height="15" rx="6" fill="#1976d2"/>
  <!-- Label -->
  <rect x="150" y="200" width="100" height="80" rx="4" fill="#1565c0" opacity="0.9"/>
  <text x="200" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#fff">CREAMY</text>
  <text x="200" y="248" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#fff">MAYO</text>
  <text x="200" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#bbdefb">Rich &amp; Smooth</text>
  <!-- Shine -->
  <rect x="145" y="165" width="8" height="160" rx="4" fill="#ffffff25"/>
</svg>
