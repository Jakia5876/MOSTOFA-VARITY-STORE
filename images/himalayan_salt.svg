<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd0"/>
    </radialGradient>
    <radialGradient id="crystal">
      <stop offset="0%" style="stop-color:#ffcdd2"/>
      <stop offset="100%" style="stop-color:#ef9a9a"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Salt pile -->
  <ellipse cx="200" cy="280" rx="120" ry="35" fill="#e5737340"/>
  <path d="M110,260 Q150,160 200,150 Q250,160 290,260 Q250,290 200,295 Q150,290 110,260 Z" fill="url(#crystal)" opacity="0.8"/>
  <!-- Crystal highlights -->
  <polygon points="180,200 190,180 200,205" fill="#f48fb1" opacity="0.6"/>
  <polygon points="210,190 225,175 220,200" fill="#ec407a" opacity="0.4"/>
  <polygon points="160,230 175,210 170,240" fill="#f06292" opacity="0.5"/>
  <polygon points="230,220 240,205 235,235" fill="#e91e63" opacity="0.3"/>
  <circle cx="195" cy="220" r="5" fill="#fff" opacity="0.3"/>
  <circle cx="215" cy="195" r="4" fill="#fff" opacity="0.25"/>
  <!-- Label -->
  <text x="200" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#c62828" letter-spacing="3">HIMALAYAN</text>
  <text x="200" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#d32f2f" letter-spacing="2">Pink Salt</text>
</svg>
