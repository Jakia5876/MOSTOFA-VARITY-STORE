<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </radialGradient>
    <linearGradient id="cheese" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffca28"/>
      <stop offset="50%" style="stop-color:#ffa000"/>
      <stop offset="100%" style="stop-color:#ff8f00"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <ellipse cx="200" cy="310" rx="120" ry="20" fill="#ff8f0015"/>
  <!-- Cheese wedge -->
  <polygon points="100,280 300,280 280,200 120,200" fill="url(#cheese)"/>
  <polygon points="280,200 300,280 320,250 300,175" fill="#e65100" opacity="0.3"/>
  <polygon points="100,280 120,200 100,220" fill="#ffa000" opacity="0.6"/>
  <!-- Top face -->
  <polygon points="120,200 280,200 300,175 140,175" fill="#ffca28"/>
  <!-- Holes -->
  <ellipse cx="180" cy="240" rx="12" ry="10" fill="#fff8e1" opacity="0.7"/>
  <ellipse cx="230" cy="250" rx="8" ry="7" fill="#fff8e1" opacity="0.6"/>
  <ellipse cx="160" cy="265" rx="7" ry="6" fill="#fff8e1" opacity="0.5"/>
  <ellipse cx="250" cy="230" rx="9" ry="7" fill="#fff8e1" opacity="0.6"/>
  <ellipse cx="200" cy="190" rx="8" ry="5" fill="#ffe082" opacity="0.4"/>
  <!-- Label -->
  <text x="200" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#e65100" letter-spacing="3">CHEDDAR</text>
  <text x="200" y="162" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#ff8f00" letter-spacing="2">Aged Cheese</text>
</svg>
