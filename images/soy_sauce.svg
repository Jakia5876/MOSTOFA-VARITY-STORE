<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3e2723"/>
      <stop offset="100%" style="stop-color:#4e342e"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="30%" style="stop-color:#333"/>
      <stop offset="70%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#111"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5d4037"/>
      <stop offset="100%" style="stop-color:#3e2723"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="345" rx="60" ry="12" fill="#00000040"/>
  <!-- Bottle body -->
  <rect x="155" y="140" width="90" height="200" rx="8" fill="url(#bottle)"/>
  <!-- Neck -->
  <rect x="180" y="95" width="40" height="50" rx="4" fill="#222"/>
  <!-- Cap -->
  <rect x="175" y="80" width="50" height="20" rx="5" fill="#d32f2f"/>
  <!-- Label -->
  <rect x="165" y="200" width="70" height="80" rx="4" fill="#f5f0e0"/>
  <text x="200" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#3e2723">SOY</text>
  <text x="200" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#3e2723">SAUCE</text>
  <line x1="175" y1="260" x2="225" y2="260" stroke="#c9a96e" stroke-width="1"/>
  <text x="200" y="275" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8d6e63">PREMIUM</text>
  <!-- Shine -->
  <rect x="160" y="145" width="8" height="190" rx="4" fill="#ffffff15"/>
</svg>
