<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </radialGradient>
    <linearGradient id="honey" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb300"/>
      <stop offset="50%" style="stop-color:#ff8f00"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <ellipse cx="200" cy="340" rx="60" ry="10" fill="#00000015"/>
  <!-- Honey jar -->
  <path d="M150,170 L150,300 Q150,325 175,325 L225,325 Q250,325 250,300 L250,170 Z" fill="#fff" opacity="0.9" stroke="#ffd54f" stroke-width="1"/>
  <!-- Honey inside -->
  <rect x="155" y="180" width="90" height="140" fill="url(#honey)" opacity="0.85" rx="2"/>
  <!-- Lid -->
  <rect x="155" y="150" width="90" height="25" rx="6" fill="#ff6f00"/>
  <rect x="170" y="140" width="60" height="15" rx="6" fill="#e65100"/>
  <!-- Cloth top -->
  <circle cx="200" cy="145" r="35" fill="#fff9c4" opacity="0.7"/>
  <path d="M165,145 Q200,120 235,145" fill="none" stroke="#ffcc02" stroke-width="2"/>
  <!-- Label -->
  <rect x="160" y="220" width="80" height="60" rx="4" fill="#ffffffcc"/>
  <text x="200" y="245" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#e65100">PURE</text>
  <text x="200" y="265" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#bf360c">HONEY</text>
  <!-- Drip -->
  <path d="M220,175 Q222,160 218,170" fill="#ffb300" opacity="0.6"/>
</svg>
