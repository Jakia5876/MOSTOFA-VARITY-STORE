<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </radialGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#558b2f"/>
      <stop offset="30%" style="stop-color:#7cb342"/>
      <stop offset="60%" style="stop-color:#689f38"/>
      <stop offset="100%" style="stop-color:#33691e"/>
    </linearGradient>
    <linearGradient id="oil" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a825"/>
      <stop offset="100%" style="stop-color:#f57f17"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <ellipse cx="200" cy="350" rx="55" ry="10" fill="#33691e30"/>
  <!-- Bottle -->
  <path d="M165,150 L165,320 Q165,340 185,340 L215,340 Q235,340 235,320 L235,150 Z" fill="url(#bottle)" opacity="0.9"/>
  <!-- Oil inside -->
  <rect x="170" y="180" width="60" height="155" fill="url(#oil)" opacity="0.7"/>
  <!-- Neck -->
  <rect x="185" y="100" width="30" height="55" rx="3" fill="#558b2f"/>
  <!-- Cork/cap -->
  <rect x="182" y="85" width="36" height="20" rx="6" fill="#795548"/>
  <!-- Label -->
  <rect x="170" y="220" width="60" height="70" rx="4" fill="#fffde7ee"/>
  <text x="200" y="245" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#33691e">EXTRA VIRGIN</text>
  <text x="200" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#1b5e20">OLIVE OIL</text>
  <circle cx="200" cy="280" r="8" fill="none" stroke="#8bc34a" stroke-width="1"/>
  <text x="200" y="284" text-anchor="middle" font-family="Arial" font-size="7" fill="#689f38">100%</text>
  <!-- Shine -->
  <rect x="169" y="155" width="6" height="180" rx="3" fill="#ffffff20"/>
</svg>
