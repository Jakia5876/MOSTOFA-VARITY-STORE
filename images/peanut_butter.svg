<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" style="stop-color:#efebe9"/>
      <stop offset="100%" style="stop-color:#d7ccc8"/>
    </radialGradient>
    <linearGradient id="pb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a1887f"/>
      <stop offset="50%" style="stop-color:#8d6e63"/>
      <stop offset="100%" style="stop-color:#6d4c41"/>
    </linearGradient>
    <linearGradient id="jar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d7ccc8aa"/>
      <stop offset="30%" style="stop-color:#efebe9cc"/>
      <stop offset="70%" style="stop-color:#d7ccc8bb"/>
      <stop offset="100%" style="stop-color:#bcaaa4aa"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <ellipse cx="200" cy="345" rx="65" ry="12" fill="#3e272318"/>
  <!-- Jar -->
  <path d="M140,160 L140,310 Q140,335 170,335 L230,335 Q260,335 260,310 L260,160 Z" fill="url(#jar)" stroke="#bcaaa4" stroke-width="1.5"/>
  <!-- PB inside -->
  <rect x="145" y="170" width="110" height="160" fill="url(#pb)" opacity="0.85" rx="2"/>
  <!-- Lid -->
  <rect x="145" y="140" width="110" height="25" rx="8" fill="#4e342e"/>
  <rect x="170" y="130" width="60" height="15" rx="6" fill="#3e2723"/>
  <!-- Label -->
  <rect x="150" y="210" width="100" height="85" rx="5" fill="#fff8e1ee"/>
  <text x="200" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#4e342e">PEANUT</text>
  <text x="200" y="258" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#3e2723">BUTTER</text>
  <line x1="165" y1="268" x2="235" y2="268" stroke="#8d6e63" stroke-width="1"/>
  <text x="200" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#795548">Creamy</text>
  <!-- Peanut icons -->
  <ellipse cx="175" cy="185" rx="8" ry="5" fill="#d7ccc8" opacity="0.5" transform="rotate(-20 175 185)"/>
  <ellipse cx="225" cy="190" rx="7" ry="4" fill="#bcaaa4" opacity="0.4" transform="rotate(15 225 190)"/>
  <!-- Shine -->
  <rect x="144" y="165" width="7" height="165" rx="3" fill="#ffffff18"/>
</svg>
